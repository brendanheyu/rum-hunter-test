<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Rum Placeholder - Fixed Studio Render</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #120904;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Product Card Layout Mirror */
        .product-card {
            width: 340px;
            height: 540px;
            background: linear-gradient(145deg, #24130a, #110904);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .image-container {
            width: 100%;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #4d230d 0%, #110904 85%);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.7);
        }

        /* Fluid hardware-accelerated wrapper for your UI scale interaction */
        .three-canvas-wrapper {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        .product-card:hover .three-canvas-wrapper {
            transform: scale(1.07);
        }

        /* Static Card UI Details */
        .product-info {
            width: 100%;
            color: #e0cfc3;
            text-align: left;
        }

        .meta {
            font-size: 0.75rem;
            color: #8c7669;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .title {
            font-size: 1.35rem;
            margin: 0 0 12px 0;
            color: #fff;
            font-weight: 300;
            font-family: 'Cormorant Garamond', serif;
        }

        .price {
            color: #ff9f43;
            font-weight: 600;
            font-size: 1.25rem;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div class="product-card">
        <div
            style="align-self: flex-start; color: #ff9f43; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold;">
            Preview</div>

        <div class="image-container">
            <div class="three-canvas-wrapper" id="rum-3d-canvas"></div>
        </div>

        <div class="product-info">
            <div class="meta">18 Years | Jamaica | 700ml | 46%</div>
            <div class="title">Distillery Vault Secret Reserve</div>
            <div class="price">$149.99</div>
        </div>
    </div>

    <script>
        // Ensure web fonts are completely parsed before triggering the WebGL engine layout loop
        window.addEventListener('load', init3DScene);

        function init3DScene() {
            const container = document.getElementById('rum-3d-canvas');
            const width = container.clientWidth;
            const height = container.clientHeight;

            const scene = new THREE.Scene();

            const camera = new THREE.PerspectiveCamera(28, width / height, 0.1, 1000);
            camera.position.set(0, 0.0, 8.0);

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4;
            container.appendChild(renderer.domElement);

            // --- 1. Procedural High-Fidelity Studio Environment Mapping ---
            // This replaces missing external assets to provide realistic glass highlight reflections
            const envCanvas = document.createElement('canvas');
            envCanvas.width = 512;
            envCanvas.height = 256;
            const envCtx = envCanvas.getContext('2d');

            envCtx.fillStyle = '#0f0804'; // Soft dark background horizon
            envCtx.fillRect(0, 0, 512, 256);

            // Soft studio box left reflection lane
            let leftBox = envCtx.createLinearGradient(40, 0, 140, 0);
            leftBox.addColorStop(0, 'rgba(255,255,255,0)');
            leftBox.addColorStop(0.5, 'rgba(255,255,255,0.75)');
            leftBox.addColorStop(1, 'rgba(255,255,255,0)');
            envCtx.fillStyle = leftBox;
            envCtx.fillRect(40, 0, 100, 256);

            // Bright clean studio softbox right reflection edge line
            let rightBox = envCtx.createLinearGradient(360, 0, 440, 0);
            rightBox.addColorStop(0, 'rgba(255,255,255,0)');
            rightBox.addColorStop(0.5, 'rgba(255,255,255,0.85)');
            rightBox.addColorStop(1, 'rgba(255,255,255,0)');
            envCtx.fillStyle = rightBox;
            envCtx.fillRect(360, 0, 80, 256);

            const envTexture = new THREE.CanvasTexture(envCanvas);
            envTexture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = envTexture;

            // --- 1b. Scene Background Gradient ---
            // Render the radial gradient spotlight inside WebGL so transmissive materials refract it
            const bgCanvas = document.createElement('canvas');
            bgCanvas.width = 512;
            bgCanvas.height = 512;
            const bgCtx = bgCanvas.getContext('2d');
            const bgGrad = bgCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
            bgGrad.addColorStop(0, '#4d230d');
            bgGrad.addColorStop(0.85, '#110904');
            bgCtx.fillStyle = bgGrad;
            bgCtx.fillRect(0, 0, 512, 512);

            const bgTexture = new THREE.CanvasTexture(bgCanvas);
            scene.background = bgTexture;

            // --- 2. Anchor Spotlighting Layout ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const frontKeyLight = new THREE.DirectionalLight(0xfff3e3, 1.8);
            frontKeyLight.position.set(2, 2, 5);
            scene.add(frontKeyLight);

            const dramaticRimBacklight = new THREE.DirectionalLight(0xffaa44, 2.0);
            dramaticRimBacklight.position.set(0, 0, -5);
            scene.add(dramaticRimBacklight);

            const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
            topLight.position.set(0, 4, 2);
            scene.add(topLight);

            // --- 3. Master Component Assembly ---
            const masterBottleGroup = new THREE.Group();
            scene.add(masterBottleGroup);

            // --- 4. Precise Stout Premium Bottle Profiles ---

            // Hollow Double-Walled Glass Profile Mapping (outer and inner profile)
            const glassPoints = [];
            
            // Outer profile (bottom to top lip)
            glassPoints.push(new THREE.Vector2(0, -1.6));
            glassPoints.push(new THREE.Vector2(0.78, -1.6));  // Base heel
            glassPoints.push(new THREE.Vector2(0.81, -1.45)); // Rounded base corner
            glassPoints.push(new THREE.Vector2(0.81, 0.50));  // Body wall cylinder
            glassPoints.push(new THREE.Vector2(0.78, 0.70));  // Shoulder start
            glassPoints.push(new THREE.Vector2(0.68, 0.90));  // Shoulder mid
            glassPoints.push(new THREE.Vector2(0.50, 1.05));  // Shoulder top
            glassPoints.push(new THREE.Vector2(0.28, 1.15));  // Neck base
            glassPoints.push(new THREE.Vector2(0.26, 1.55));  // Neck mid
            glassPoints.push(new THREE.Vector2(0.28, 1.58));  // Lower collar flare
            glassPoints.push(new THREE.Vector2(0.28, 1.63));
            glassPoints.push(new THREE.Vector2(0.26, 1.65));  // Lip collar indent
            glassPoints.push(new THREE.Vector2(0.29, 1.68));  // Upper mouth lip flare
            glassPoints.push(new THREE.Vector2(0.29, 1.76));
            glassPoints.push(new THREE.Vector2(0.25, 1.78));  // Top rim outer
            glassPoints.push(new THREE.Vector2(0.20, 1.78));  // Top rim inner
            
            // Inner profile (top rim down to interior base)
            glassPoints.push(new THREE.Vector2(0.20, 1.15));  // Inner neck hollow
            glassPoints.push(new THREE.Vector2(0.42, 1.00));  // Inner shoulder top
            glassPoints.push(new THREE.Vector2(0.60, 0.85));  // Inner shoulder mid
            glassPoints.push(new THREE.Vector2(0.72, 0.65));  // Inner shoulder bottom
            glassPoints.push(new THREE.Vector2(0.75, 0.45));  // Inner body wall top
            glassPoints.push(new THREE.Vector2(0.75, -1.35)); // Inner body wall bottom
            glassPoints.push(new THREE.Vector2(0.70, -1.42)); // Inner corner
            glassPoints.push(new THREE.Vector2(0, -1.42));    // Inner base center
            
            const glassGeometry = new THREE.LatheGeometry(glassPoints, 64);

            // Internal Liquid Profile sitting inside the hollow glass cavity
            const liquidPoints = [];
            liquidPoints.push(new THREE.Vector2(0, -1.41));    // Base center of liquid
            liquidPoints.push(new THREE.Vector2(0.74, -1.41));  // Base edge
            liquidPoints.push(new THREE.Vector2(0.74, 0.45));   // Vertical side top
            liquidPoints.push(new THREE.Vector2(0.71, 0.65));   // Shoulder start
            liquidPoints.push(new THREE.Vector2(0.59, 0.85));   // Shoulder mid
            liquidPoints.push(new THREE.Vector2(0.41, 1.00));   // Shoulder top
            liquidPoints.push(new THREE.Vector2(0.19, 1.15));   // Lower neck
            liquidPoints.push(new THREE.Vector2(0.19, 1.35));   // Liquid fill level inside neck
            liquidPoints.push(new THREE.Vector2(0, 1.35));      // Liquid top center
            
            const liquidGeometry = new THREE.LatheGeometry(liquidPoints, 64);

            // Clear Glass Stopper Cap Sitting on Top Rim
            const stopperPoints = [];
            stopperPoints.push(new THREE.Vector2(0, 1.75));      // Sits on mouth rim
            stopperPoints.push(new THREE.Vector2(0.23, 1.75));   // Bottom edge of cap
            stopperPoints.push(new THREE.Vector2(0.24, 1.80));   // Rounded side
            stopperPoints.push(new THREE.Vector2(0.24, 1.92));   // Rounded side top
            stopperPoints.push(new THREE.Vector2(0.20, 1.97));   // Curve to top center
            stopperPoints.push(new THREE.Vector2(0, 1.97));      // Top center
            
            const stopperGeometry = new THREE.LatheGeometry(stopperPoints, 64);

            // --- 5. Premium Physical PBR Shading Models ---

            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                roughness: 0.02,
                metalness: 0.0,
                transmission: 0.98,
                ior: 1.52,
                thickness: 0.0,     // 0.0 for double-walled glass to avoid double-refraction artifacts
                clearcoat: 1.0,
                clearcoatRoughness: 0.02,
                transparent: true
            });

            // Rich, dense transmissive physical liquid to make the rum highly obvious
            const liquidMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x8c3500,       // Rich deep amber rum color
                roughness: 0.05,
                metalness: 0.0,
                transmission: 0.35,    // Reduced transmission to make the liquid rich and dense
                ior: 1.35,             // Index of refraction of water/alcohol
                thickness: 1.5,        // Volumetric absorption
                clearcoat: 1.0,
                clearcoatRoughness: 0.05,
                transparent: true
            });

            const glassMesh = new THREE.Mesh(glassGeometry, glassMaterial);
            const liquidMesh = new THREE.Mesh(liquidGeometry, liquidMaterial);
            const stopperMesh = new THREE.Mesh(stopperGeometry, glassMaterial);

            masterBottleGroup.add(liquidMesh);
            masterBottleGroup.add(glassMesh);
            masterBottleGroup.add(stopperMesh);

            // --- 6. Custom Elegant Paper Label Construction ---
            const canvasWidth = 1024;
            const canvasHeight = 512;
            const textCanvas = document.createElement('canvas');
            textCanvas.width = canvasWidth;
            textCanvas.height = canvasHeight;
            const ctx = textCanvas.getContext('2d');

            // Clear the canvas to keep the background transparent
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            // Set up context translation & scale to compensate for Cylinder mapping horizontal stretch (2.57x)
            ctx.translate(canvasWidth / 2, canvasHeight / 2);
            ctx.scale(0.39, 1.0); // Mathematically cancels out the 2.57x cylinder stretch

            // Label dimensions in "natural" coordinates (centered at 0, 0)
            const labelW = 480;
            const labelH = 340;

            // Draw sticker background with elegant dark charcoal color
            ctx.fillStyle = '#151311';
            ctx.fillRect(-labelW / 2, -labelH / 2, labelW, labelH);

            // Draw a subtle gold gradient border
            const borderGrad = ctx.createLinearGradient(0, -labelH / 2, 0, labelH / 2);
            borderGrad.addColorStop(0, '#d4af37');
            borderGrad.addColorStop(0.5, '#f3e5ab');
            borderGrad.addColorStop(1, '#aa7c11');

            // Outer gold border
            ctx.strokeStyle = borderGrad;
            ctx.lineWidth = 4;
            ctx.strokeRect(-labelW / 2 + 8, -labelH / 2 + 8, labelW - 16, labelH - 16);
            
            // Inner gold border (thin)
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-labelW / 2 + 14, -labelH / 2 + 14, labelW - 28, labelH - 28);

            // High-end Typography setup (non-italic, clean serif)
            ctx.fillStyle = '#e8c49e'; // Soft textured matte gold color
            ctx.font = '600 64px "Cormorant Garamond", "Georgia", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.letterSpacing = '5px';

            // Configure drop shadow for 3D embossed gold finish
            ctx.shadowColor = 'rgba(0, 0, 0, 0.85)';
            ctx.shadowBlur = 5;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            // Draw "Coming Soon" in two lines (non-italic)
            ctx.fillText("Coming", 0, -45);
            ctx.fillText("Soon", 0, 45);

            // Restore context state to avoid affecting other canvas operations (just in case)
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            const textTexture = new THREE.CanvasTexture(textCanvas);
            textTexture.wrapS = THREE.RepeatWrapping;
            textTexture.repeat.x = 1;

            // Concentric cylindrical wrap sitting flush onto the body barrel (no Z tilt to prevent intersections)
            const labelGeometry = new THREE.CylinderGeometry(0.818, 0.818, 1.0, 64, 1, true);
            const labelMaterial = new THREE.MeshStandardMaterial({
                map: textTexture,
                side: THREE.FrontSide,
                roughness: 0.40,
                metalness: 0.10,
                transparent: true
            });

            const labelMesh = new THREE.Mesh(labelGeometry, labelMaterial);
            labelMesh.position.set(0, -0.35, 0); // Positioned centered onto the lower barrel body section
            masterBottleGroup.add(labelMesh);

            // Vertically balance the focal anchor point center layer
            masterBottleGroup.position.y = -0.15;

            // --- 7. Smooth Uniform Global Rotation Execution Loop ---
            function animateScene() {
                requestAnimationFrame(animateScene);

                // Elegant placeholder continuous spin
                masterBottleGroup.rotation.y += 0.005;

                renderer.render(scene, camera);
            }
            animateScene();

            // --- 8. Handle UI Card Dimensions Scaling Updates ---
            window.addEventListener('resize', () => {
                const w = container.clientWidth;
                const h = container.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
        }
    </script>
</body>

</html>
