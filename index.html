  <style>
    /* CLS-Critical Inline Styles — only layout dimensions needed before index.css loads */
    :root {
      --color-cask-shadow: hsl(16, 60%, 5%);
      --color-liquid-mahogany: hsl(18, 70%, 12%);
      --color-liquid-chestnut: hsl(24, 80%, 22%);
      --color-rum-amber: hsl(33, 90%, 45%);
      --color-refraction-gold: hsl(42, 95%, 62%);
      --color-ice-facet: hsl(195, 45%, 88%);
      --color-text-primary: hsl(40, 20%, 96%);
      --color-text-muted: hsl(35, 10%, 65%);
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Outfit', sans-serif;
      --transition-base: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      --transition-slow: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--color-cask-shadow);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Three-Tier Viewport Background Stack --- */
    .background-viewport {
      position: fixed;
      top: -10vh;
      left: -10vw;
      width: 120vw;
      height: 120vh;
      z-index: -10;
      pointer-events: none;
      background: linear-gradient(135deg, var(--color-cask-shadow), var(--color-liquid-mahogany));
      filter: blur(80px);
      transform: scale(1.0) translate3d(0, 0, 0);
      transition: transform 1.5s cubic-bezier(0.25, 1, 0.33, 1), filter 1.5s cubic-bezier(0.25, 1, 0.33, 1);
      will-change: transform, filter;
    }

    .stir-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .blob {
      transform-origin: center;
      mix-blend-mode: color-dodge;
      will-change: transform;
    }

    .blob-1 {
      animation: drift-1 12s ease-in-out infinite alternate;
    }

    .blob-2 {
      animation: drift-2 16s ease-in-out infinite alternate;
    }

    .blob-3 {
      animation: drift-3 14s ease-in-out infinite alternate;
    }

    .blob-4 {
      animation: drift-4 10s ease-in-out infinite alternate;
    }

    .blob-5 {
      animation: drift-5 18s ease-in-out infinite alternate;
    }

    @keyframes drift-1 {
      0% {
        transform: translate3d(-8%, -10%, 0) scale(1.0);
      }

      50% {
        transform: translate3d(12%, 8%, 0) scale(1.2);
      }

      100% {
        transform: translate3d(-4%, 15%, 0) scale(0.9);
      }
    }

    @keyframes drift-2 {
      0% {
        transform: translate3d(6%, 12%, 0) scale(0.95);
      }

      50% {
        transform: translate3d(-12%, -5%, 0) scale(1.25);
      }

      100% {
        transform: translate3d(4%, -12%, 0) scale(1.0);
      }
    }

    @keyframes drift-3 {
      0% {
        transform: translate3d(-12%, 8%, 0) scale(1.15);
      }

      50% {
        transform: translate3d(8%, -15%, 0) scale(0.85);
      }

      100% {
        transform: translate3d(12%, 4%, 0) scale(1.05);
      }
    }

    @keyframes drift-4 {
      0% {
        transform: translate3d(4%, -12%, 0) scale(1.05);
      }

      50% {
        transform: translate3d(-6%, 12%, 0) scale(0.95);
      }

      100% {
        transform: translate3d(-12%, -8%, 0) scale(1.15);
      }
    }

    @keyframes drift-5 {
      0% {
        transform: translate3d(10%, -8%, 0) scale(0.9);
      }

      50% {
        transform: translate3d(-10%, 15%, 0) scale(1.2);
      }

      100% {
        transform: translate3d(-2%, -12%, 0) scale(0.95);
      }
    }

    .vignette-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, transparent 30%, var(--color-cask-shadow) 100%);
      pointer-events: none;
    }

    /* Structural layout — prevents reflow when index.css applies */
    .app-wrapper {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(16, 6, 2, 0.4);
      border-bottom: 1px solid rgba(59, 29, 10, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .section-container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 0 40px;
    }

    /* Grid skeleton layout */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      transition: opacity var(--transition-base);
      min-height: 930px;
    }

    .card-container {
      perspective: 1200px;
      height: 450px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card-front {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      background: rgba(16, 6, 2, 0.45);
      border: 1px solid rgba(59, 29, 10, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-img-box {
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 8px 0;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    /* List skeleton layout */
    .products-list {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
      margin-top: 20px;
    }

    .list-item-row {
      background: rgba(16, 6, 2, 0.45);
      border: 1px solid rgba(59, 29, 10, 0.3);
      border-radius: 12px;
    }

    .list-thumb-box {
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    /* Pagination skeleton layout */
    .pagination-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      padding: 16px 24px;
      background: rgba(16, 6, 2, 0.45);
      border: 1px solid rgba(59, 29, 10, 0.35);
      border-radius: 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .pagination-controls-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pagination-btn {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(59, 29, 10, 0.5);
      color: var(--color-text-muted);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all var(--transition-base);
    }

    /* URL Sync Display overrides before DOMContentLoaded */
    html.init-view-list #grid-view-container {
      display: none !important;
    }

    html.init-view-list #list-view-container {
      display: table !important;
    }

    html.init-view-grid #grid-view-container {
      display: grid !important;
    }

    html.init-view-grid #list-view-container {
      display: none !important;
    }

    html.init-limit-3 #grid-view-container .skeleton-card:nth-child(n+4) {
      display: none !important;
    }

    html.init-limit-3 #list-view-body .skeleton-row:nth-child(n+4) {
      display: none !important;
    }

    /* Skeleton Loading System */
    .skeleton-card {
      pointer-events: none;
    }

    .skeleton-glow {
      background: linear-gradient(90deg, rgba(59, 29, 10, 0.15) 25%, rgba(230, 126, 34, 0.25) 37%, rgba(59, 29, 10, 0.15) 63%);
      background-size: 400% 100%;
      animation: skeleton-shimmer 1.4s ease infinite;
      border-radius: 4px;
    }

    @keyframes skeleton-shimmer {
      0% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .skeleton-badge {
      width: 75px;
      height: 20px;
    }

    .skeleton-star {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .skeleton-image {
      width: 80px;
      height: 170px;
      border-radius: 8px;
    }

    .skeleton-meta {
      width: 150px;
      height: 14px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      width: 85%;
      height: 22px;
      margin-bottom: 12px;
    }

    .skeleton-price {
      width: 100px;
      height: 24px;
    }

    .skeleton-list-thumb {
      width: 36px;
      height: 36px;
      border-radius: 4px;
    }

    .skeleton-list-title {
      width: 180px;
      height: 18px;
      margin-bottom: 6px;
    }

    .skeleton-list-subtitle {
      width: 80px;
      height: 12px;
    }

    .skeleton-list-meta {
      width: 140px;
      height: 14px;
    }

    .skeleton-list-price-cell {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .skeleton-list-price {
      width: 70px;
      height: 18px;
    }

    .skeleton-list-badge {
      width: 80px;
      height: 16px;
      border-radius: 4px;
    }

    .skeleton-list-star {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .skeleton-list-btn {
      width: 60px;
      height: 28px;
      border-radius: 4px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js" defer></script>
  <script>
    // Prevent layout shift (CLS) for URL-based states before initial paint
    (function () {
      const params = new URLSearchParams(window.location.search);
      const view = params.get('view') || 'grid';
      const limit = params.get('limit') || '6';
      const docEl = document.documentElement;
      docEl.classList.add('init-view-' + view);
      docEl.classList.add('init-limit-' + limit);
    })();
  </script>
